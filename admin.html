<!DOCTYPE html>
<html class="light" lang="ko">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>한양부동산 | 관리자 페이지</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
  </style>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "border": "#e5e8eb",
            "on-primary": "#ffffff",
            "body": "#4e5968",
            "on-surface": "#181c23",
            "canvas": "#ffffff",
            "foreground": "#191f28",
            "surface": "#f2f4f6",
            "primary": "#0059b9",
            "muted": "#8b95a1",
            "primary-hover": "#2272eb",
            "surface-container-highest": "#e0e2ec"
          }
        }
      }
    }
  </script>
</head>
<body class="bg-surface text-foreground min-h-screen flex flex-col justify-between">

  <header class="bg-white border-b border-border">
    <div class="flex justify-between items-center h-16 px-6 max-w-[1200px] mx-auto w-full">
      <a class="text-xl font-bold text-primary tracking-tight" href="index.html">한양부동산</a>
      <a class="text-sm font-bold text-muted hover:text-primary transition-colors" href="index.html">홈페이지 바로가기</a>
    </div>
  </header>

  <main class="flex-grow max-w-[1200px] w-full mx-auto px-6 py-12 flex items-center justify-center">
    
    <div id="login-container" class="w-full max-w-md bg-white p-8 rounded-3xl border border-border shadow-md">
      <h2 class="text-2xl font-bold text-foreground text-center mb-6">관리자 로그인</h2>
      <form id="login-form" class="space-y-4">
        <div>
          <label class="block text-sm font-bold text-on-surface mb-2 text-[14px]">비밀번호</label>
          <input id="password-input" class="w-full h-12 px-4 rounded-xl border border-border focus:border-primary focus:ring-0 transition-colors text-[14px]" placeholder="비밀번호를 입력하세요" type="password" required>
        </div>
        <div id="error-message" class="text-red-500 text-sm hidden font-semibold">비밀번호가 올바르지 않습니다.</div>
        <button type="submit" class="w-full h-12 bg-primary text-on-primary rounded-xl font-bold hover:bg-primary-hover transition-all active:scale-95 min-h-[44px]">로그인</button>
      </form>
    </div>

    <div id="dashboard-container" class="hidden w-full bg-white p-6 md:p-8 rounded-3xl border border-border shadow-md self-start">
      <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 border-b border-border pb-6 mb-6">
        <div>
          <h1 class="text-2xl font-bold text-foreground">게시글 관리</h1>
          <p class="text-sm text-muted mt-1">소식게시판의 게시글 목록입니다. 게시글을 작성, 수정, 삭제할 수 있습니다.</p>
        </div>
        <div class="flex gap-3">
          <a href="news-write" class="inline-flex items-center justify-center bg-primary text-on-primary font-bold px-5 py-2.5 rounded-xl hover:bg-primary-hover transition-all active:scale-95 min-h-[44px]">새 글 작성</a>
          <button id="logout-btn" class="inline-flex items-center justify-center bg-surface text-foreground font-bold px-5 py-2.5 rounded-xl hover:bg-border transition-all active:scale-95 min-h-[44px]">로그아웃</button>
        </div>
      </div>

      <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse">
          <thead>
            <tr class="border-b border-border text-sm text-muted">
              <th class="py-3 px-4 w-16">번호</th>
              <th class="py-3 px-4 w-24">구분</th>
              <th class="py-3 px-4">제목</th>
              <th class="py-3 px-4 w-32">작성일</th>
              <th class="py-3 px-4 w-40 text-center">동작</th>
            </tr>
          </thead>
          <tbody id="posts-table-body" class="text-sm text-body">
          </tbody>
        </table>
      </div>
      <div id="no-posts-message" class="hidden text-center py-12 text-muted text-[14px]">작성된 게시글이 없습니다.</div>
    </div>

  </main>

  <footer class="bg-white py-6 border-t border-border text-center text-xs text-muted">
    © 2026 한양부동산 공인중개사사무소. All rights reserved.
  </footer>

  <script src="db.js"></script>
  <script>
    async function initPage() {
      if (window.db.isAdmin()) {
        document.getElementById('login-container').classList.add('hidden');
        document.getElementById('dashboard-container').classList.remove('hidden');
        await loadDashboard();
      } else {
        document.getElementById('login-container').classList.remove('hidden');
        document.getElementById('dashboard-container').classList.add('hidden');
        setupLoginForm();
      }
    }

    function setupLoginForm() {
      const form = document.getElementById('login-form');
      const errEl = document.getElementById('error-message');
      
      form.onsubmit = async (e) => {
        e.preventDefault();
        errEl.classList.add('hidden');
        
        const pwdInput = document.getElementById('password-input').value;
        const config = await window.db.loadConfig();
        
        if (pwdInput === config.admin_password) {
          sessionStorage.setItem('isAdmin', 'true');
          location.reload();
        } else {
          errEl.classList.remove('hidden');
        }
      };
    }

    async function loadDashboard() {
      document.getElementById('logout-btn').onclick = () => {
        sessionStorage.removeItem('isAdmin');
        location.reload();
      };

      try {
        const posts = await window.db.getPosts();
        const tbody = document.getElementById('posts-table-body');
        const noMsg = document.getElementById('no-posts-message');
        
        if (!posts || posts.length === 0) {
          tbody.innerHTML = '';
          noMsg.classList.remove('hidden');
          return;
        }
        
        noMsg.classList.add('hidden');
        tbody.innerHTML = posts.map((post, idx) => {
          return `
            <tr class="border-b border-border hover:bg-surface/50 transition-colors">
              <td class="py-3 px-4">${posts.length - idx}</td>
              <td class="py-3 px-4"><span class="bg-primary/10 text-primary text-xs font-bold px-2 py-0.5 rounded">${window.db.escapeHtml(post.category || '공지사항')}</span></td>
              <td class="py-3 px-4 font-semibold text-foreground"><a href="news-detail?id=${post.id}" class="hover:text-primary transition-colors">${window.db.escapeHtml(post.title)}</a></td>
              <td class="py-3 px-4">${window.db.escapeHtml(post.date)}</td>
              <td class="py-3 px-4 text-center space-x-1">
                <a href="news-write?id=${post.id}" class="inline-block bg-surface hover:bg-border text-foreground text-xs font-bold px-3 py-1.5 rounded transition-all min-h-[30px]">수정</a>
                <button onclick="handleDelete('${post.id}')" class="bg-red-500 hover:bg-red-600 text-white text-xs font-bold px-3 py-1.5 rounded transition-all min-h-[30px]">삭제</button>
              </td>
            </tr>
          `;
        }).join('');
      } catch (e) {
        console.error("Failed to load dashboard posts:", e);
      }
    }

    async function handleDelete(id) {
      if (confirm('정말로 이 게시글을 삭제하시겠습니까?')) {
        try {
          await window.db.deletePost(id);
          alert('게시글이 삭제되었습니다.');
          await loadDashboard();
        } catch (e) {
          alert('삭제에 실패했습니다: ' + e.message);
        }
      }
    }

    window.addEventListener('DOMContentLoaded', initPage);
  </script>
</body>
</html>
