  <main class="flex-grow max-w-[800px] w-full mx-auto px-6 py-12">

      </div>

      <div id="post-content" class="text-body text-[14px] md:text-[16px] leading-relaxed">
      </div>

      <div id="admin-actions" class="hidden border-t border-border mt-10 pt-6 flex gap-4 justify-end">
        <button id="edit-btn" class="bg-surface text-foreground font-bold px-6 py-2.5 rounded-xl hover:bg-border transition-all active:scale-95 min-h-[44px]">수정</button>
        <button id="delete-btn" class="bg-red-500 text-white font-bold px-6 py-2.5 rounded-xl hover:bg-red-600 transition-all active:scale-95 min-h-[44px]">삭제</button>

    <div class="mt-8 text-center">

  </main>

  <footer class="bg-surface-container-highest py-12 w-full px-6 border-t border-border">

        <p class="text-body text-sm text-[14px]">대표: 이성민 <br>사업자등록번호: 899-60-00442<br>중개업소 등록번호: 제41273-2020-00100호</p>
        <div class="flex flex-wrap gap-4 text-sm text-muted text-[14px]">
          <a class="hover:text-on-surface transition-colors" href="#">사업자정보확인</a>
          <a class="hover:text-on-surface transition-colors" href="#">이용약관</a>
          <a class="hover:text-on-surface transition-colors font-bold text-primary underline" href="#">개인정보처리방침</a>
          <a id="agent-login-btn" class="hover:text-on-surface transition-colors text-primary font-bold" href="admin.html">Agent Login</a>
        </div>
        <p class="text-sm text-muted text-[14px]">© 2026 한양부동산 공인중개사사무소. All rights reserved.</p>
      </div>
      <div class="flex gap-4">
        <button class="w-12 h-12 rounded-full border border-border flex items-center justify-center hover:bg-white transition-colors min-h-[44px] min-w-[44px]">
          <span class="material-symbols-outlined text-body">share</span>
        </button>
        <a href="tel:031-483-7600" class="w-12 h-12 rounded-full border border-border flex items-center justify-center hover:bg-white transition-colors min-h-[44px] min-w-[44px]">

  <nav class="fixed bottom-0 left-0 w-full flex justify-between items-center gap-4 px-5 py-3 md:hidden bg-canvas/90 backdrop-blur-md border-t border-border z-50 shadow-lg">

      <span class="material-symbols-outlined">call</span>
      <span class="font-body-sm text-body-sm font-bold">전화상담</span>
    </a>
    <button onclick="window.db.openKakaoTalk()" class="flex items-center justify-center bg-secondary-container text-on-secondary-container rounded-xl px-6 py-3 w-full gap-2 active:scale-95 transition-transform min-h-[44px]">
      <span class="material-symbols-outlined">chat</span>
      <span class="font-body-sm text-body-sm font-bold">카톡문의</span>
    </button>
  </nav>

  <script src="db.js"></script>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const postId = urlParams.get('id');

    async function loadPostDetail() {
      if (!postId) {
        alert('잘못된 접근입니다.');
        window.location.href = 'news';
        return;
      }

      try {
        const posts = await window.db.getPosts();
        const post = posts.find(p => p.id === postId);
        
        if (!post) {
          alert('게시글을 찾을 수 없습니다.');
          window.location.href = 'news';
          return;
        }

        document.getElementById('post-category').textContent = post.category || '공지사항';
        document.getElementById('post-date').textContent = post.date;
        document.getElementById('post-title').textContent = post.title;
        document.getElementById('post-content').innerHTML = window.db.renderMarkdown(post.content);

        if (window.db.isAdmin()) {
          const actionsDiv = document.getElementById('admin-actions');
          actionsDiv.classList.remove('hidden');

          document.getElementById('edit-btn').onclick = () => {
            window.location.href = `news-write?id=${postId}`;
          };

          document.getElementById('delete-btn').onclick = async () => {
            if (confirm('정말로 이 게시글을 삭제하시겠습니까?')) {
              try {
                await window.db.deletePost(postId);
                alert('게시글이 삭제되었습니다.');
                window.location.href = 'news';
              } catch (e) {
                alert('게시글 삭제에 실패했습니다: ' + e.message);
              }
            }
          };
        }
      } catch (e) {
        console.error("Failed to load post detail:", e);
      }
    }

    window.addEventListener('DOMContentLoaded', loadPostDetail);
  </script>
</body>
</html>
